<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Novels Carousel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <style>
        .carousel-item img {
            height: 500px; /* Restricts the height so it's not massive */
            object-fit: contain; /* Keeps the book covers from stretching or warping */
            background-color: #f8f9fa; /* Optional: adds a light grey background to any empty space */
        }
    </style>
</head>
<body>

<div id="novelCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="10000">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#novelCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button> 
        <button type="button" data-bs-target="#novelCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button> 
        <button type="button" data-bs-target="#novelCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="./The-Alchemist.png" class="d-block w-50 mx-auto" alt="The alchemist Book Cover">
            <div class="carousel-caption d-none d-md-block text-dark bg-light bg-opacity-75 rounded p-2">
                <h5>The Alchemist</h5>
                <p>Paulo Coelho's international bestseller of all time</p>
            </div>
        </div>
        
        <div class="carousel-item">
            <img src="./hardworking women.webp" class="d-block w-50 mx-auto" alt="1984 Book Cover">
            <div class="carousel-caption d-none d-md-block text-dark bg-light bg-opacity-75 rounded p-2">
                <h5>1984</h5>
                <p>Women leading the world</p>
            </div>
        </div>
        
        <div class="carousel-item">
            <img src="./trainur.jpg" class="d-block w-50 mx-auto" alt="To Kill a Mockingbird Book Cover">
            <div class="carousel-caption d-none d-md-block text-dark bg-light bg-opacity-75 rounded p-2">
                <h5>Time to train your mind</h5> 
                <p>self help book</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#novelCarousel" data-bs-slide="prev"> 
        <span class="carousel-control-prev-icon btn-dark rounded-circle" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#novelCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon btn-dark rounded-circle" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
